<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Family Point Tracker</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <!-- Stable Firebase Global Scripts to prevent blank screen crashes -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
</head>
<body class="bg-gray-100">
  <div id="root"></div>

  <script type="text/babel">
    const firebaseConfig = {
      apiKey: "AIzaSyCEGl4q7U8QShWY_urUUwzSrTOkYuB5HMc",
      authDomain: "kids-points-tracker-6fd3c.firebaseapp.com",
      projectId: "kids-points-tracker-6fd3c",
      storageBucket: "kids-points-tracker-6fd3c.firebasestorage.app",
      messagingSenderId: "922080181506",
      appId: "1:922080181506:web:1ccbcab29519b00278561b",
      measurementId: "G-8GF59YTB8K"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const auth = firebase.auth();

    const { useState, useEffect } = React;

    function App() {
      const [user, setUser] = useState(null);
      const [kids, setKids] = useState([]);
      const [actions, setActions] = useState([]);
      const [rewards, setRewards] = useState([]);
      const [activeTab, setActiveTab] = useState('home');
      const [modalState, setModalState] = useState({ isOpen: false, type: null, kid: null });

      useEffect(() => {
        auth.signInAnonymously().catch(err => console.error("Auth Error:", err));
        const unsubscribe = auth.onAuthStateChanged(setUser);
        return () => unsubscribe();
      }, []);

      useEffect(() => {
        if (!user) return;
        
        const unsubKids = db.collection('kids').onSnapshot(snap => {
          setKids(snap.docs.map(d => ({ id: d.id, ...d.data() })));
        }, err => console.error(err));
        
        const unsubActions = db.collection('actions').onSnapshot(snap => {
          setActions(snap.docs.map(d => ({ id: d.id, ...d.data() })));
        }, err => console.error(err));
        
        const unsubRewards = db.collection('rewards').onSnapshot(snap => {
          setRewards(snap.docs.map(d => ({ id: d.id, ...d.data() })));
        }, err => console.error(err));
        
        return () => { unsubKids(); unsubActions(); unsubRewards(); };
      }, [user]);

      const updatePoints = async (kid, amount) => {
        try {
          await db.collection('kids').doc(kid.id).update({ points: (kid.points || 0) + amount });
          setModalState({ isOpen: false, type: null, kid: null });
        } catch (err) { console.error("Error updating points:", err); }
      };

      if (!user) return <div className="flex h-screen items-center justify-center bg-gray-50"><p className="text-gray-500 font-bold">Loading Tracker...</p></div>;

      return (
        <div className="flex flex-col h-screen max-w-md mx-auto shadow-xl relative bg-gray-100">
          <header className="bg-indigo-600 text-white p-4 shadow-md z-10 flex-shrink-0">
            <h1 className="text-xl font-bold text-center">Family Point Tracker</h1>
          </header>

          <main className="flex-1 overflow-y-auto p-4 pb-24">
            {activeTab === 'home' ? (
              <HomeTab kids={kids} openModal={(type, kid) => setModalState({ isOpen: true, type, kid })} />
            ) : (
              <ManageTab kids={kids} actions={actions} rewards={rewards} />
            )}
          </main>

          <nav className="bg-white border-t border-gray-200 absolute bottom-0 w-full flex justify-around p-3 pb-6 z-10">
            <button onClick={() => setActiveTab('home')} className={`flex flex-col items-center p-2 ${activeTab === 'home' ? 'text-indigo-600' : 'text-gray-500'}`}>
              <span className="text-2xl">🏠</span>
              <span className="text-xs mt-1 font-medium">Home</span>
            </button>
            <button onClick={() => setActiveTab('manage')} className={`flex flex-col items-center p-2 ${activeTab === 'manage' ? 'text-indigo-600' : 'text-gray-500'}`}>
              <span className="text-2xl">⚙️</span>
              <span className="text-xs mt-1 font-medium">Manage</span>
            </button>
          </nav>

          {modalState.isOpen && (
            <ActionModal state={modalState} close={() => setModalState({ isOpen: false, type: null, kid: null })} actions={actions} rewards={rewards} onConfirm={updatePoints} />
          )}
        </div>
      );
    }

    function HomeTab({ kids, openModal }) {
      if (kids.length === 0) return <div className="text-center mt-10 text-gray-500"><p>No kids added yet.</p><p className="text-sm mt-2">Go to Manage to add your kids.</p></div>;
      
      const sortedKids = [...kids].sort((a, b) => (a.name || "").localeCompare(b.name || ""));

      return (
        <div className="space-y-4">
          {sortedKids.map(kid => (
            <div key={kid.id} className="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
              <div className="p-5 flex justify-between items-center bg-gradient-to-r from-indigo-50 to-white">
                <h2 className="text-2xl font-bold text-gray-800">{kid.name || "Unknown Kid"}</h2>
                <div className="text-right">
                  <span className="text-sm text-gray-500 uppercase tracking-wide font-semibold">Points</span>
                  <div className={`text-4xl font-black ${(kid.points || 0) < 0 ? 'text-red-500' : 'text-indigo-600'}`}>{(kid.points || 0)}</div>
                </div>
              </div>
              <div className="grid grid-cols-3 gap-2 p-3 bg-gray-50">
                <button onClick={() => openModal('positive', kid)} className="flex flex-col items-center justify-center p-3 bg-green-100 text-green-700 rounded-lg active:bg-green-200">
                  <span className="text-2xl mb-1">➕</span><span className="text-xs font-bold">Earn</span>
                </button>
                <button onClick={() => openModal('negative', kid)} className="flex flex-col items-center justify-center p-3 bg-red-100 text-red-700 rounded-lg active:bg-red-200">
                  <span className="text-2xl mb-1">➖</span><span className="text-xs font-bold">Deduct</span>
                </button>
                <button onClick={() => openModal('redeem', kid)} className="flex flex-col items-center justify-center p-3 bg-purple-100 text-purple-700 rounded-lg active:bg-purple-200">
                  <span className="text-2xl mb-1">🎁</span><span className="text-xs font-bold">Redeem</span>
                </button>
              </div>
            </div>
          ))}
        </div>
      );
    }

    function ManageTab({ kids, actions, rewards }) {
      const [newKid, setNewKid] = useState('');
      const [newAction, setNewAction] = useState({ name: '', value: '', type: 'positive' });
      const [newReward, setNewReward] = useState({ name: '', cost: '' });

      const addData = async (e, collectionName, data, resetFn) => {
        e.preventDefault();
        try { await db.collection(collectionName).add(data); resetFn(); } catch (err) { console.error(err); }
      };

      const deleteItem = async (col, id) => {
        try { await db.collection(col).doc(id).delete(); } catch (err) { console.error(err); }
      };

      return (
        <div className="space-y-8 pb-10">
          <section className="bg-white p-4 rounded-xl shadow-sm">
            <h3 className="text-lg font-bold mb-4 flex items-center text-gray-800"><span className="mr-2">👤</span> Kids</h3>
            <form onSubmit={e => { if(newKid.trim()) addData(e, 'kids', {name: newKid, points: 0}, () => setNewKid('')); }} className="flex gap-2 mb-4">
              <input type="text" value={newKid} onChange={e => setNewKid(e.target.value)} placeholder="Kid's Name" className="flex-1 border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-indigo-500" />
              <button type="submit" className="bg-indigo-600 text-white px-4 py-2 rounded-lg text-sm font-semibold">Add</button>
            </form>
            <ul className="space-y-2">
              {kids.map(k => (
                <li key={k.id} className="flex justify-between items-center bg-gray-50 p-2 rounded-lg text-sm">
                  <span>{k.name || "Unknown Kid"}</span><button onClick={() => deleteItem('kids', k.id)} className="text-red-500 p-1">🗑️</button>
                </li>
              ))}
            </ul>
          </section>

          <section className="bg-white p-4 rounded-xl shadow-sm">
            <h3 className="text-lg font-bold mb-4 flex items-center text-gray-800"><span className="mr-2">📋</span> Point Actions</h3>
            <form onSubmit={e => { if(newAction.name.trim() && newAction.value) addData(e, 'actions', {name: newAction.name, value: parseInt(newAction.value), type: newAction.type}, () => setNewAction({name:'', value:'', type:'positive'})); }} className="flex flex-col gap-2 mb-4">
              <div className="flex gap-2">
                <input type="text" value={newAction.name} onChange={e => setNewAction({...newAction, name: e.target.value})} placeholder="Action (e.g. Clean Room)" className="flex-1 border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-indigo-500" />
                <input type="number" value={newAction.value} onChange={e => setNewAction({...newAction, value: e.target.value})} placeholder="Pts" className="w-20 border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-indigo-500" />
              </div>
              <div className="flex gap-2">
                <select value={newAction.type} onChange={e => setNewAction({...newAction, type: e.target.value})} className="flex-1 border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-indigo-500 bg-white">
                  <option value="positive">Positive (+)</option><option value="negative">Negative (-)</option>
                </select>
                <button type="submit" className="bg-indigo-600 text-white px-4 py-2 rounded-lg text-sm font-semibold">Add</button>
              </div>
            </form>
            <div className="space-y-2 max-h-48 overflow-y-auto">
              {actions.map(a => (
                <div key={a.id} className="flex justify-between items-center bg-gray-50 p-2 rounded-lg text-sm">
                  <span className="truncate pr-2">{a.name || "Unnamed Action"}</span>
                  <div className="flex items-center gap-3 whitespace-nowrap">
                    <span className={`font-bold ${a.type === 'positive' ? 'text-green-600' : 'text-red-600'}`}>{a.type === 'positive' ? '+' : '-'}{a.value || 0}</span>
                    <button onClick={() => deleteItem('actions', a.id)} className="text-red-500 p-1">🗑️</button>
                  </div>
                </div>
              ))}
            </div>
          </section>

          <section className="bg-white p-4 rounded-xl shadow-sm mb-4">
            <h3 className="text-lg font-bold mb-4 flex items-center text-gray-800"><span className="mr-2">🎁</span> Reward Legend</h3>
            <form onSubmit={e => { if(newReward.name.trim() && newReward.cost) addData(e, 'rewards', {name: newReward.name, cost: parseInt(newReward.cost)}, () => setNewReward({name:'', cost:''})); }} className="flex gap-2 mb-4">
              <input type="text" value={newReward.name} onChange={e => setNewReward({...newReward, name: e.target.value})} placeholder="Reward (e.g. TV Time)" className="flex-1 border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-indigo-500" />
              <input type="number" value={newReward.cost} onChange={e => setNewReward({...newReward, cost: e.target.value})} placeholder="Cost" className="w-20 border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-indigo-500" />
              <button type="submit" className="bg-indigo-600 text-white px-3 py-2 rounded-lg text-sm font-semibold">Add</button>
            </form>
            <div className="space-y-2 max-h-48 overflow-y-auto">
              {rewards.map(r => (
                <div key={r.id} className="flex justify-between items-center bg-gray-50 p-2 rounded-lg text-sm">
                  <span className="truncate pr-2">{r.name || "Unnamed Reward"}</span>
                  <div className="flex items-center gap-3 whitespace-nowrap">
                    <span className="font-bold text-purple-600">-{r.cost || 0}</span>
                    <button onClick={() => deleteItem('rewards', r.id)} className="text-red-50
